<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>티끌모아 태산</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA 테마 색상 -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="background-color" content="#0a0f1e" />

    <!-- iOS Safari PWA 지원 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="티끌태산" />
    <link rel="apple-touch-icon" href="/manus-storage/pwa-icon-white-bg_a3a1c388.png" />

    <!-- Android Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / 공유 메타태그 -->
    <meta name="description" content="티끌모아 태산 — 개인 투자 포트폴리오 추적, 국제 정세 분석, 매도 전략 대시보드" />
    <meta property="og:title" content="티끌모아 태산" />
    <meta property="og:description" content="개인 투자 포트폴리오 추적 · 국제 정세 분석 · 매도 전략" />
    <meta property="og:image" content="/manus-storage/pwa-icon-white-bg_a3a1c388.png" />
    <meta property="og:type" content="website" />

    <!-- 파비콘 -->
    <link rel="icon" type="image/png" href="/manus-storage/pwa-icon-white-bg_a3a1c388.png" />

    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>

    <!-- Service Worker 등록 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[PWA] Service Worker 등록 완료:', reg.scope))
            .catch((err) => console.warn('[PWA] Service Worker 등록 실패:', err));
        });
      }
    </script>
  </body>
</html>
